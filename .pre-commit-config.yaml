repos:

  # ── Standard file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-yaml
        # Basic YAML parse check (yamllint does the deeper linting below)

  # ── YAML style ────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  # ── JSON Schema validity ───────────────────────────────────────────────────
  # Validates every schema.oold.yaml against the JSON Schema metaschema
  # declared in its own $schema field.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.29.4
    hooks:
      - id: check-jsonschema
        name: Validate OO-LD schemas
        files: ^schemas/.*\.oold\.yaml$
        args: [--check-metaschema]

  # ── Markdown style ────────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.yaml, --fix]
